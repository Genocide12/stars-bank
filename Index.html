<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>Stars Bank</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none}
:root{
  --bg:#0a0a0f;--bg-2:#141420;--card:#1a1a2e;
  --purple:#8b5cf6;--purple-2:#a855f7;--gold:#fbbf24;--gold-2:#f59e0b;
  --text:#fff;--text-dim:#9ca3af;--green:#10b981;--red:#ef4444;
  --border:rgba(139,92,246,.2);
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
  --vh:1vh;--header-h:44px;--ticker-h:36px;--nav-h:56px;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;height:100%;overflow:hidden;overscroll-behavior:none;touch-action:manipulation;-webkit-font-smoothing:antialiased}
body,input,button,textarea{font-family:inherit}
input,textarea{user-select:text;-webkit-user-select:text}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}

.global-ticker{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--ticker-h);padding:2px 0;background:linear-gradient(90deg,rgba(251,191,36,.08),rgba(139,92,246,.08));border-bottom:1px solid var(--border);overflow:hidden}
.ticker{display:flex;animation:ts var(--ticker-dur,60s) linear infinite;width:max-content;will-change:transform}
.ticker-card{flex:0 0 auto;width:40vw;max-width:180px;margin:0 4px;padding:4px 8px;background:linear-gradient(135deg,rgba(251,191,36,.18),rgba(245,158,11,.08));border:1px solid rgba(251,191,36,.25);border-radius:8px;display:flex;align-items:center;gap:6px;cursor:pointer;height:32px}
.ticker-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple-2));display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.ticker-info{flex:1;min-width:0}
.ticker-user{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.ticker-mult{font-size:11px;font-weight:800;color:var(--gold);white-space:nowrap;flex-shrink:0}
@keyframes ts{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.app{position:relative;z-index:1;width:100%;height:calc(var(--vh,1vh)*100 - var(--ticker-h));max-width:480px;margin:var(--ticker-h) auto 0 auto;display:flex;flex-direction:column;overflow:hidden}
.header{flex-shrink:0;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(35,35,64,.6));border-bottom:1px solid var(--border);gap:8px}
.header-logo{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.logo-ico{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--purple),var(--gold));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 4px 14px rgba(139,92,246,.4)}
.logo-text{font-weight:700;font-size:14px}
.header-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.header-bal{flex-shrink:0;display:flex;align-items:center;gap:4px;padding:5px 9px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:9px;font-size:11px;font-weight:700;cursor:pointer}

.main{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.page.active{display:flex}

.bank-scroll,.balance-scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding-bottom:calc(var(--nav-h) + var(--safe-b))}
.pad{padding:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:10px}
.card-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.bank-total{text-align:center;padding:16px 14px;background:linear-gradient(135deg,rgba(139,92,246,.25),rgba(251,191,36,.1));border:1px solid var(--border);border-radius:16px;margin-bottom:10px;position:relative;overflow:hidden}
.bank-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.bank-value{font-size:28px;font-weight:800;margin:4px 0}
.progress-bar{width:100%;height:7px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--gold));border-radius:10px;transition:width .6s;width:0%}
.timer{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;font-size:12px;font-weight:600;color:#fca5a5;margin-bottom:10px}
.freeze-amounts{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px}
.freeze-amt{padding:9px 3px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:11px;font-weight:700}
.freeze-amt.active{background:linear-gradient(135deg,var(--purple),var(--purple-2));border-color:transparent}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--purple),var(--purple-2));border-radius:11px;color:white;font-size:13px;font-weight:700;box-shadow:0 6px 18px rgba(139,92,246,.4)}
.btn-primary.gold{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#1a1a2e}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.user-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.stat-box{padding:9px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:11px}
.stat-label{font-size:9px;color:var(--text-dim);margin-bottom:3px}
.stat-val{font-size:12px;font-weight:700}

.games-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:y mandatory;scroll-behavior:smooth}
.games-section{min-height:100%;scroll-snap-align:start;display:flex;flex-direction:column}
.all-games-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
.all-game-tile{padding:14px 6px;background:var(--card);border:1px solid var(--border);border-radius:12px;text-align:center;cursor:pointer}
.all-game-tile.active{background:linear-gradient(135deg,rgba(139,92,246,.3),rgba(251,191,36,.1));border-color:var(--purple)}
.all-game-tile .ic{font-size:28px;margin-bottom:4px}
.all-game-tile .nm{font-size:11px;font-weight:700}
.game-area{flex:1;display:none;flex-direction:column;min-height:0;overflow:hidden}
.game-area.active{display:flex}
.game-board{flex:1;min-height:0;position:relative;margin:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.board-main{flex:1;min-height:0;position:relative;overflow:hidden}
.board-canvas{width:100%;height:100%;display:block}
.game-controls{flex-shrink:0;background:var(--bg-2);border-top:1px solid var(--border);padding:5px 10px calc(5px + var(--safe-b));display:flex;flex-direction:column;gap:4px}
.bet-controls{display:flex;gap:4px;align-items:center}
.bet-input{flex:1;padding:7px 9px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-weight:600;outline:none}
.bet-btn{width:34px;height:34px;background:rgba(139,92,246,.2);border:1px solid var(--border);border-radius:8px;color:white;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center}
.quick-bets{display:flex;gap:3px}
.quick-bet{flex:1;padding:6px 2px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:10px;font-weight:600}
.extra-controls{display:flex;gap:3px;flex-wrap:wrap}
.extra-btn{flex:1;min-width:55px;padding:5px 2px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:9px;font-weight:600}
.extra-btn.active{background:linear-gradient(135deg,var(--purple),var(--purple-2));border-color:transparent}
.game-action-btn{padding:10px;width:100%;background:linear-gradient(135deg,var(--purple),var(--purple-2));border-radius:10px;color:white;font-size:12px;font-weight:700}
.game-action-btn.gold{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#1a1a2e}
.mini-stats{display:flex;justify-content:space-around;padding:4px 5px;background:rgba(255,255,255,.03);border-radius:6px;font-size:9px;color:var(--text-dim);border:1px solid var(--border)}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(20,20,32,.95);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:6px 0 calc(6px + var(--safe-b));z-index:100}
.nav-wrap{max-width:480px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:0 10px}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;color:var(--text-dim);border-radius:9px}
.nav-btn .ni{font-size:18px}
.nav-btn .nl{font-size:9px;font-weight:600}
.nav-btn.active{background:linear-gradient(135deg,rgba(139,92,246,.25),rgba(168,85,247,.1));color:white}

.profile-tabs-nav{flex-shrink:0;display:flex;gap:3px;padding:8px 10px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.profile-tabs-nav::-webkit-scrollbar{display:none}
.profile-tab-btn{flex-shrink:0;padding:7px 10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:10px;font-weight:600;white-space:nowrap}
.profile-tab-btn.active{background:linear-gradient(135deg,var(--purple),var(--purple-2));border-color:transparent;color:white}
.profile-scroll{flex:1;display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;padding-bottom:calc(var(--nav-h) + var(--safe-b))}
.profile-panel{flex:0 0 100%;scroll-snap-align:start;overflow-y:auto;padding:10px}

.menu-list{display:flex;flex-direction:column;gap:5px}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer}
.menu-item.danger{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.05)}
.menu-item.danger .menu-ico{background:rgba(239,68,68,.2)}
.menu-item.danger .menu-label{color:var(--red)}
.menu-ico{width:30px;height:30px;border-radius:8px;background:rgba(139,92,246,.2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.menu-label{flex:1;font-size:12px;font-weight:600}
.menu-arrow{color:var(--text-dim);font-size:16px}
.toggle{position:relative;width:38px;height:22px;background:rgba(255,255,255,.1);border-radius:11px;transition:background .2s;flex-shrink:0;cursor:pointer}
.toggle.on{background:var(--purple)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:white;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}

/* Game Settings Sliders */
.slider-group{margin-bottom:14px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.slider-group-title{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.slider-label{font-size:11px;color:var(--text-dim);min-width:70px;flex-shrink:0}
.slider-input{flex:1;-webkit-appearance:none;appearance:none;height:6px;background:rgba(255,255,255,.1);border-radius:3px;outline:none}
.slider-input::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:var(--purple);cursor:pointer;box-shadow:0 0 10px rgba(139,92,246,.5);border:2px solid white}
.slider-value{font-size:12px;font-weight:700;min-width:45px;text-align:right;color:var(--gold)}
.slider-info{font-size:10px;color:var(--text-dim);margin-top:4px;padding:6px 8px;background:rgba(0,0,0,.3);border-radius:6px;line-height:1.5}
.slider-info b{color:var(--gold)}
.slider-row.disabled{opacity:.5;pointer-events:none}

/* Error Log */
.error-log-item{padding:10px 12px;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);border-radius:8px;margin-bottom:6px;font-size:11px}
.error-log-time{font-size:9px;color:var(--text-dim);margin-bottom:3px}
.error-log-msg{color:var(--red);font-weight:600;margin-bottom:2px}
.error-log-stack{font-size:9px;color:var(--text-dim);font-family:monospace;word-break:break-all;margin-top:3px;max-height:60px;overflow-y:auto}
.error-log-empty{text-align:center;padding:30px;color:var(--text-dim);font-size:12px}

/* Toast & Modal */
.toast{position:fixed;top:calc(12px + var(--safe-t) + var(--ticker-h));left:50%;transform:translateX(-50%) translateY(-120px);background:linear-gradient(135deg,var(--purple),var(--purple-2));color:white;padding:9px 15px;border-radius:11px;font-size:12px;font-weight:600;z-index:3000;transition:transform .3s;max-width:90%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:linear-gradient(135deg,var(--green),#059669)}
.toast.error{background:linear-gradient(135deg,var(--red),#dc2626)}
.toast.gold{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#1a1a2e}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{position:relative;width:100%;max-width:480px;background:var(--bg-2);border-radius:18px 18px 0 0;padding:14px 12px calc(18px + var(--safe-b));max-height:85vh;overflow-y:auto}
.modal-handle{width:34px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 10px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:10px;text-align:center}
.modal-close{position:absolute;top:10px;right:12px;width:26px;height:26px;background:rgba(255,255,255,.1);border-radius:50%;color:white;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:5;cursor:pointer}
.input-group{margin-bottom:10px}
.input-label{font-size:10px;color:var(--text-dim);margin-bottom:3px;display:block}
.input-field{width:100%;padding:10px 11px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-weight:600;outline:none}
.quick-amts{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px}
.quick-amt{padding:9px 3px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:11px;font-weight:700}
.quick-amt.active{background:linear-gradient(135deg,var(--purple),var(--purple-2));border-color:transparent}

.balance-fixed-top{flex-shrink:0;background:var(--bg);padding:10px;border-bottom:1px solid var(--border)}
.history-item{display:flex;align-items:center;padding:9px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:9px;margin-bottom:5px;font-size:11px;gap:8px}
.history-item .h-icon{font-size:15px;flex-shrink:0}
.history-item .h-info{flex:1;min-width:0}
.history-item .h-title{font-weight:600}
.history-item .h-time{font-size:9px;color:var(--text-dim)}
.history-item .h-amount{font-weight:700;flex-shrink:0}
.h-amount.pos{color:var(--green)}
.h-amount.neg{color:var(--red)}
</style>
</head>
<body>

<div class="global-ticker"><div class="ticker" id="tickerTrack"></div></div>

<div class="app">
  <div class="main">
    <!-- BANK PAGE -->
    <div class="page active" id="page-bank">
      <div class="header">
        <div class="header-logo"><div class="logo-ico">⭐</div><div><div class="logo-text">Stars Bank</div></div></div>
        <div class="header-bal">⭐ <span id="hbalBank">0</span></div>
      </div>
      <div class="bank-scroll"><div class="pad">
        <div class="bank-total"><div class="bank-label">💎 Общий банк</div><div class="bank-value">⭐ <span id="totalBank">0</span></div></div>
        <div class="timer">⏱ До конца круга: <strong id="timerValue">06:00:00</strong></div>
        <div class="card"><div class="card-title">❄️ Заморозка</div>
          <div class="freeze-amounts" id="freezeAmounts">
            <button class="freeze-amt active" data-amt="100">100</button><button class="freeze-amt" data-amt="500">500</button><button class="freeze-amt" data-amt="1000">1K</button><button class="freeze-amt" data-amt="5000">5K</button><button class="freeze-amt" data-amt="10000">10K</button>
          </div>
          <button class="btn-primary" id="freezeBtn">❄️ Заморозить</button>
          <div class="user-stats">
            <div class="stat-box"><div class="stat-label">Заморожено</div><div class="stat-val">⭐ <span id="frozenAmount">0</span></div></div>
            <div class="stat-box"><div class="stat-label">Прибыль</div><div class="stat-val" style="color:var(--green)">+<span id="profitAmount">0</span></div></div>
            <div class="stat-box"><div class="stat-label">В час</div><div class="stat-val" style="color:var(--gold)">+<span id="profitPerHour">0</span></div></div>
          </div>
          <button class="btn-primary gold" style="margin-top:10px" id="unfreezeBtn" disabled>💰 Забрать</button>
        </div>
      </div></div>
    </div>

    <!-- BALANCE PAGE -->
    <div class="page" id="page-balance">
      <div class="header"><div class="header-logo"><div class="logo-ico">⭐</div><div><div class="logo-text">Stars Bank</div></div></div><div class="header-bal">⭐ <span id="hbalBalance">0</span></div></div>
      <div class="balance-fixed-top">
        <div class="bank-total"><div class="bank-label">Баланс</div><div class="bank-value">⭐ <span id="balancePage">0</span></div></div>
        <div style="display:flex;gap:6px;margin-top:8px"><button class="btn-primary" id="depBtn" style="flex:1">⭐ Пополнить</button><button class="btn-primary gold" id="wdBtn" style="flex:1">💸 Вывести</button></div>
      </div>
      <div class="balance-scroll-area"><div class="card"><div class="card-title">📊 История</div><div id="balanceHistory"></div></div></div>
    </div>

    <!-- GAMES PAGE -->
    <div class="page" id="page-games">
      <div class="header"><div class="header-title"><span id="ghIcon">🎱</span><span id="ghName">Плинко</span></div><div class="header-bal">⭐ <span id="hbalGames">0</span></div></div>
      <div class="games-scroll" id="gamesScroll">
        <div class="games-section"><div style="padding:14px 12px 4px;font-size:13px;font-weight:700;color:var(--text-dim)">🎮 Выбери игру</div>
          <div class="all-games-grid" id="allGamesGrid"></div>
        </div>
        <div class="games-section" id="sectionPlay">
          <div class="game-area active" data-area="plinko" id="area-plinko"></div>
          <div class="game-area" data-area="crash" id="area-crash"></div>
          <div class="game-area" data-area="mines" id="area-mines"></div>
          <div class="game-area" data-area="dice" id="area-dice"></div>
          <div class="game-area" data-area="tower" id="area-tower"></div>
          <div class="game-area" data-area="blackjack" id="area-blackjack"></div>
        </div>
      </div>
    </div>

    <!-- PROFILE PAGE -->
    <div class="page" id="page-profile">
      <div class="header"><div class="header-title">👤 Профиль</div><div class="header-bal">⭐ <span id="hbalProfile">0</span></div></div>
      <div class="profile-tabs-nav" id="profileTabsNav">
        <button class="profile-tab-btn active" data-ptab="gamesettings">🎮 Управление</button>
        <button class="profile-tab-btn" data-ptab="errors">🐛 Ошибки</button>
        <button class="profile-tab-btn" data-ptab="settings">⚙️ Настройки</button>
      </div>
      <div class="profile-scroll" id="profileScroll">
        <div class="profile-panel" data-panel="gamesettings" id="panelGameSettings"></div>
        <div class="profile-panel" data-panel="errors" id="panelErrors"></div>
        <div class="profile-panel" data-panel="settings" id="panelSettings"></div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-wrap">
    <button class="nav-btn active" data-page="bank"><span class="ni">🏦</span><span class="nl">Банк</span></button>
    <button class="nav-btn" data-page="balance"><span class="ni">💰</span><span class="nl">Баланс</span></button>
    <button class="nav-btn" data-page="games"><span class="ni">🎮</span><span class="nl">Игры</span></button>
    <button class="nav-btn" data-page="profile"><span class="ni">👤</span><span class="nl">Профиль</span></button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ============ ERROR LOGGER ============
const ErrorLogger = {
  errors: [],
  KEY: 'sb_errors_v1',
  init() {
    try {
      const stored = localStorage.getItem(this.KEY);
      this.errors = stored ? JSON.parse(stored) : [];
      if (!Array.isArray(this.errors)) this.errors = [];
    } catch { this.errors = []; }
    
    window.addEventListener('error', (e) => {
      this.add({
        type: 'uncaught',
        message: e.message,
        stack: e.error?.stack || '',
        filename: e.filename,
        lineno: e.lineno,
        colno: e.colno,
        time: Date.now()
      });
    });
    
    window.addEventListener('unhandledrejection', (e) => {
      this.add({
        type: 'promise',
        message: e.reason?.message || String(e.reason),
        stack: e.reason?.stack || '',
        time: Date.now()
      });
    });
  },
  add(err) {
    this.errors.unshift(err);
    if (this.errors.length > 100) this.errors = this.errors.slice(0, 100);
    this.save();
    if (document.getElementById('panelErrors')) renderErrorPanel();
  },
  log(message, stack='') {
    this.add({ type:'manual', message, stack, time:Date.now() });
  },
  save() {
    try { localStorage.setItem(this.KEY, JSON.stringify(this.errors)); } catch {}
  },
  getAll() { return this.errors; },
  clear() {
    this.errors = [];
    this.save();
    if (document.getElementById('panelErrors')) renderErrorPanel();
  },
  getText() {
    return this.errors.map(e => {
      const d = new Date(e.time);
      return `[${d.toISOString()}] ${e.type}: ${e.message}\n${e.stack ? '  Stack: '+e.stack : ''}`;
    }).join('\n\n');
  }
};

// ============ UTILS ============
const $ = id => document.getElementById(id);
const fmt = n => Math.floor(n).toLocaleString('ru-RU');
const setVh = () => document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
setVh(); window.addEventListener('resize', setVh);

let toastTm = null;
const toast = (msg, type, dur=2800) => {
  const t = $('toast'); if (!t) return;
  t.textContent = msg; t.className = 'toast show ' + (type||'');
  clearTimeout(toastTm); toastTm = setTimeout(() => t.classList.remove('show'), dur);
};

// ============ SAFE LOCALSTORAGE ============
function safeGetItem(key, fallback=null) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
  catch(e) { ErrorLogger.log(`safeGetItem failed for ${key}: ${e.message}`); return fallback; }
}
function safeSetItem(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch(e) { ErrorLogger.log(`safeSetItem failed for ${key}: ${e.message}`); return false; }
}
function safeRemoveItem(key) {
  try { localStorage.removeItem(key); return true; }
  catch(e) { ErrorLogger.log(`safeRemoveItem failed for ${key}: ${e.message}`); return false; }
}

// ============ AUDIO (SAFE) ============
let audioCtx = null;
let soundEnabled = true;
try { soundEnabled = safeGetItem('sb_sound', '1') !== '0'; } catch { soundEnabled = true; }

function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
  }
  if (audioCtx.state === 'suspended') {
    try { audioCtx.resume(); } catch(e) {}
  }
  return audioCtx;
}
['touchstart','click','keydown'].forEach(ev => {
  document.addEventListener(ev, () => {
    try { if (audioCtx?.state === 'suspended') audioCtx.resume(); } catch {}
  }, {passive:true});
});

function playTone(freq, dur, type='sine', vol=0.12) {
  if (!soundEnabled) return;
  const ctx = ensureAudio();
  if (!ctx || ctx.state !== 'running') return;
  try {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
const SFX = {
  win: () => { playTone(523,0.08); setTimeout(()=>playTone(659,0.08),60); setTimeout(()=>playTone(784,0.1),130); },
  lose: () => { playTone(200,0.12,'sawtooth',0.08); setTimeout(()=>playTone(150,0.15,'sawtooth',0.08),90); },
  click: () => playTone(800,0.03,'square',0.06),
  bigwin: () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.15,'triangle',0.15),i*80)); }
};

// ============ STATE ============
const DEFAULT_STATE = {
  balance: 1000, frozen: 0, pendingProfit: 0,
  totalBank: 287432, goalLevel: 1,
  userId: Math.floor(100000 + Math.random() * 900000),
  userName: 'Гость',
  cycleEnd: Date.now() + 6 * 3600 * 1000,
  notif: true,
  games: { plinko:{total:0,won:0,maxMult:0}, crash:{total:0,won:0,maxMult:0}, mines:{total:0,won:0,maxMult:0}, dice:{total:0,won:0,maxMult:0}, tower:{total:0,won:0,maxMult:0}, blackjack:{total:0,won:0,bjCount:0} }
};

const state = safeGetItem('sb_state_v9', DEFAULT_STATE);
// Ensure all game keys exist
['plinko','crash','mines','dice','tower','blackjack'].forEach(g => {
  if (!state.games) state.games = {};
  if (!state.games[g]) state.games[g] = { total:0, won:0, maxMult:0 };
  if (state.games[g].maxMult === undefined) state.games[g].maxMult = 0;
  if (g === 'blackjack' && state.games[g].bjCount === undefined) state.games[g].bjCount = 0;
});
if (!state.cycleEnd || state.cycleEnd < Date.now() - 86400000) state.cycleEnd = Date.now() + 6*3600*1000;

function saveState() { safeSetItem('sb_state_v9', state); }

// ============ GAME SETTINGS ============
const GAME_CONFIGS = {
  crash: {
    name: '🚀 Краш',
    params: {
      houseEdge: { label: 'Комиссия сайта', min: 0.5, max: 5, step: 0.1, value: 1, unit: '%', desc: 'Процент преимущества казино' },
      instantCrashChance: { label: 'Шанс мгновенного краша', min: 0.1, max: 5, step: 0.1, value: 1, unit: '%', desc: 'Вероятность краша на 1.00x' },
      maxMultiplier: { label: 'Макс. множитель', min: 100, max: 100000, step: 100, value: 10000, unit: 'x', desc: 'Теоретический максимум' }
    },
    compute(key, val, all) {
      const result = { ...all };
      if (key === 'houseEdge') {
        result.houseEdge = val;
        // При увеличении комиссии шанс мгновенного краша растёт
        result.instantCrashChance = Math.max(0.1, Math.round(val * 1.0 * 10) / 10);
      }
      if (key === 'instantCrashChance') {
        result.instantCrashChance = val;
        result.houseEdge = Math.max(0.5, Math.round(val * 1.0 * 10) / 10);
      }
      if (key === 'maxMultiplier') {
        result.maxMultiplier = val;
        // Чем выше макс, тем больше комиссия (защита от экстремальных значений)
        result.houseEdge = Math.round((0.5 + (val / 100000) * 4.5) * 10) / 10;
      }
      return result;
    },
    getFormula: (p) => `Краш-поинт = ${(p.houseEdge/100).toFixed(3)} / (1 - random)`
  },
  dice: {
    name: '🎲 Кубик',
    params: {
      houseEdge: { label: 'Комиссия сайта', min: 0.5, max: 5, step: 0.1, value: 1, unit: '%', desc: 'Процент преимущества казино' },
      targetNumber: { label: 'Целевое число', min: 1, max: 99, step: 1, value: 50, unit: '', desc: 'Граница для броска меньше/больше' },
      payoutMultiplier: { label: 'Множитель выплаты', min: 1.01, max: 99, step: 0.01, value: 2.0, unit: 'x', desc: 'Во сколько раз увеличивается ставка' }
    },
    compute(key, val, all) {
      const result = { ...all };
      if (key === 'houseEdge' || key === 'targetNumber') {
        if (key === 'houseEdge') result.houseEdge = val;
        if (key === 'targetNumber') result.targetNumber = Math.round(val);
        const chance = result.targetNumber * (1 - result.houseEdge / 100);
        result.payoutMultiplier = Math.round((99 / Math.max(1, chance)) * 100) / 100;
      }
      if (key === 'payoutMultiplier') {
        result.payoutMultiplier = Math.round(val * 100) / 100;
        const target = Math.round(99 / result.payoutMultiplier / (1 - result.houseEdge / 100));
        result.targetNumber = Math.max(1, Math.min(99, target));
      }
      return result;
    },
    getFormula: (p) => `Множитель = 99 / (Цель × (1 - ${(p.houseEdge/100).toFixed(3)}))`
  },
  mines: {
    name: '💣 Мины',
    params: {
      houseEdge: { label: 'Комиссия сайта', min: 0.5, max: 5, step: 0.1, value: 3, unit: '%', desc: 'Процент преимущества казино' },
      mineCount: { label: 'Количество мин (5×5)', min: 1, max: 24, step: 1, value: 8, unit: 'шт', desc: 'Чем больше мин, тем выше множитель' },
      baseMultiplier: { label: 'Базовый множитель', min: 1.01, max: 5, step: 0.01, value: 1.5, unit: 'x', desc: 'Множитель за первую открытую клетку' }
    },
    compute(key, val, all) {
      const result = { ...all };
      if (key === 'mineCount') {
        result.mineCount = Math.round(val);
        const cells = 25, mines = result.mineCount;
        const safe = cells - mines;
        result.baseMultiplier = Math.round((1 + (mines / safe) * (1 - result.houseEdge/100)) * 100) / 100;
      }
      if (key === 'baseMultiplier') {
        result.baseMultiplier = Math.round(val * 100) / 100;
      }
      if (key === 'houseEdge') {
        result.houseEdge = Math.round(val * 10) / 10;
      }
      return result;
    },
    getFormula: (p) => `Множитель(n) = ∏(25-i)/(25-${p.mineCount}-i) × (1 - ${(p.houseEdge/100).toFixed(3)})`
  },
  tower: {
    name: '🗼 Башня',
    params: {
      houseEdge: { label: 'Комиссия сайта', min: 0.5, max: 5, step: 0.1, value: 1, unit: '%', desc: 'Процент преимущества казино' },
      skullsPerRow: { label: 'Черепов в ряду', min: 1, max: 3, step: 1, value: 1, unit: 'шт', desc: 'Количество опасных клеток на этаж' },
      rowsCount: { label: 'Этажей', min: 5, max: 12, step: 1, value: 8, unit: '', desc: 'Всего этажей в башне' }
    },
    compute(key, val, all) {
      const result = { ...all };
      if (key === 'skullsPerRow') result.skullsPerRow = Math.round(val);
      if (key === 'rowsCount') result.rowsCount = Math.round(val);
      if (key === 'houseEdge') result.houseEdge = Math.round(val * 10) / 10;
      return result;
    },
    getFormula: (p) => `Множитель(этаж) = ∏ 3/(3-${p.skullsPerRow}) × (1 - ${(p.houseEdge/100).toFixed(3)})`
  },
  plinko: {
    name: '🎱 Плинко',
    params: {
      houseEdge: { label: 'Комиссия сайта', min: 0.5, max: 5, step: 0.1, value: 1, unit: '%', desc: 'Процент преимущества казино' },
      rowsCount: { label: 'Рядов гвоздей', min: 8, max: 16, step: 1, value: 12, unit: '', desc: 'Больше рядов = более плавное распределение' },
      maxMultiplier: { label: 'Макс. множитель', min: 5, max: 100, step: 1, value: 10, unit: 'x', desc: 'Множитель в крайних слотах' }
    },
    compute(key, val, all) {
      const result = { ...all };
      if (key === 'rowsCount') result.rowsCount = Math.round(val);
      if (key === 'maxMultiplier') result.maxMultiplier = Math.round(val);
      if (key === 'houseEdge') {
        result.houseEdge = Math.round(val * 10) / 10;
        // Больше комиссия = меньше макс. множитель
        result.maxMultiplier = Math.max(5, Math.round(10 * (1 - (val-0.5)/4.5) + 2));
      }
      return result;
    },
    getFormula: (p) => `Распределение: нормальное с пиком в центре, края ×${p.maxMultiplier}`
  },
  blackjack: {
    name: '🃏 Блэкджек',
    params: {
      houseEdge: { label: 'Комиссия сайта', min: 0.2, max: 3, step: 0.1, value: 0.5, unit: '%', desc: 'Процент преимущества казино' },
      decksCount: { label: 'Колод', min: 1, max: 8, step: 1, value: 6, unit: 'шт', desc: 'Больше колод = меньше преимущество счётчика' },
      blackjackPayout: { label: 'Выплата за BJ', min: 1.5, max: 3, step: 0.1, value: 2.5, unit: 'x', desc: 'Множитель при натуральном блэкджеке' }
    },
    compute(key, val, all) {
      const result = { ...all };
      if (key === 'decksCount') result.decksCount = Math.round(val);
      if (key === 'blackjackPayout') {
        result.blackjackPayout = Math.round(val * 10) / 10;
        result.houseEdge = Math.round((3 - result.blackjackPayout + 0.2) * 10) / 10;
      }
      if (key === 'houseEdge') {
        result.houseEdge = Math.round(val * 10) / 10;
        result.blackjackPayout = Math.round((3 - val + 0.5) * 10) / 10;
      }
      return result;
    },
    getFormula: (p) => `RTP ≈ 99.5% (оптимальная стратегия), выплата BJ: ×${p.blackjackPayout}`
  }
};

// Store active configs
let gameSettings = safeGetItem('sb_game_settings', {});
// Ensure defaults
Object.keys(GAME_CONFIGS).forEach(gk => {
  if (!gameSettings[gk]) {
    gameSettings[gk] = {};
    Object.entries(GAME_CONFIGS[gk].params).forEach(([pk, p]) => {
      gameSettings[gk][pk] = p.value;
    });
  }
});

function saveGameSettings() { safeSetItem('sb_game_settings', gameSettings); }

// ============ UI UPDATE ============
function updateUI() {
  const bal = fmt(state.balance);
  ['hbalBank','hbalBalance','hbalGames','hbalProfile','balancePage'].forEach(id => {
    const el = $(id); if (el) el.textContent = bal;
  });
  const tb = $('totalBank'); if (tb) tb.textContent = fmt(state.totalBank);
  const fa = $('frozenAmount'); if (fa) fa.textContent = fmt(state.frozen);
  const profit = Math.floor(state.frozen * 0.05);
  const pa = $('profitAmount'); if (pa) pa.textContent = fmt(state.pendingProfit > 0 ? state.pendingProfit : profit);
  const pph = $('profitPerHour'); if (pph) pph.textContent = fmt(Math.floor(profit / 6));
  const ub = $('unfreezeBtn');
  if (ub) { ub.disabled = !(state.frozen > 0 && Date.now() >= state.cycleEnd); ub.textContent = (state.frozen > 0 && Date.now() >= state.cycleEnd) ? '💰 Забрать прибыль' : '💰 Забрать (после круга)'; }
}

function renderHistory() {
  const el = $('balanceHistory'); if (!el) return;
  const history = safeGetItem('sb_history_v9', []);
  if (!history.length) { el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:12px;">Пока нет операций</div>'; return; }
  el.innerHTML = history.slice(0, 30).map(h => {
    const d = new Date(h.time), ts = d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
    const pos = h.amount >= 0;
    return `<div class="history-item"><div class="h-icon">${h.type==='deposit'?'💳':h.type==='withdraw'?'💸':'⭐'}</div><div class="h-info"><div class="h-title">${h.title}</div><div class="h-time">${ts}</div></div><div class="h-amount ${pos?'pos':'neg'}">${pos?'+':''}${fmt(h.amount)} ⭐</div></div>`;
  }).join('');
}

function addHistory(type, title, amount) {
  const history = safeGetItem('sb_history_v9', []);
  history.unshift({ type, title, amount, time: Date.now() });
  if (history.length > 200) history.splice(200);
  safeSetItem('sb_history_v9', history);
  renderHistory();
}

// ============ TICKER ============
const BOT_NAMES = ['Alex','Max','Kate','Neo','Luna','Jack','Mia','Leo','Zoe','Eva','Kai','Nina','Ivan','Sara','Tom'];
const rndName = () => BOT_NAMES[Math.floor(Math.random()*BOT_NAMES.length)] + Math.floor(Math.random()*999);

function renderTicker() {
  const el = $('tickerTrack'); if (!el) return;
  const items = safeGetItem('sb_ticker', []);
  if (!items.length) { el.innerHTML = ''; return; }
  let html = '';
  items.slice(0, 15).forEach(it => {
    html += `<div class="ticker-card"><div class="ticker-avatar">${it.icon||'⭐'}</div><div class="ticker-info"><div class="ticker-user">@${it.name}</div></div><div class="ticker-mult">x${it.mult.toFixed(0)}</div></div>`;
  });
  el.innerHTML = html + html;
}

function initTicker() {
  let items = safeGetItem('sb_ticker', []);
  if (!items.length) {
    for (let i = 0; i < 15; i++) {
      items.push({ name: rndName(), mult: 25 + Math.random() * 200, icon: '🚀' });
    }
    safeSetItem('sb_ticker', items);
  }
  renderTicker();
}

// ============ NAVIGATION ============
let currentPage = 'bank';
let currentGame = 'plinko';

function switchPage(name) {
  currentPage = name;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const page = document.getElementById('page-' + name);
  if (page) page.classList.add('active');
  const navBtn = document.querySelector(`.nav-btn[data-page="${name}"]`);
  if (navBtn) navBtn.classList.add('active');
  if (name === 'games') setTimeout(initGames, 50);
  if (name === 'profile') setTimeout(renderProfile, 50);
  if (name === 'balance') setTimeout(renderHistory, 50);
  SFX.click();
}

function switchGame(game) {
  currentGame = game;
  document.querySelectorAll('.all-game-tile').forEach(t => t.classList.toggle('active', t.dataset.game === game));
  document.querySelectorAll('.game-area').forEach(a => a.classList.toggle('active', a.dataset.area === game));
  const gi = $('ghIcon'), gn = $('ghName');
  if (gi) gi.textContent = GAME_CONFIGS[game]?.name?.split(' ')[1] || '🎱';
  if (gn) gn.textContent = GAME_CONFIGS[game]?.name?.split(' ').slice(1).join(' ') || 'Игра';
  SFX.click();
}

document.querySelectorAll('.nav-btn').forEach(b => {
  b.addEventListener('click', e => { e.preventDefault(); switchPage(b.dataset.page); });
});

// ============ GAMES INIT ============
function initGames() {
  const grid = $('allGamesGrid'); if (!grid) return;
  grid.innerHTML = '';
  Object.entries(GAME_CONFIGS).forEach(([key, cfg]) => {
    const tile = document.createElement('div');
    tile.className = 'all-game-tile' + (key === currentGame ? ' active' : '');
    tile.dataset.game = key;
    tile.innerHTML = `<div class="ic">${cfg.name.split(' ')[0]}</div><div class="nm">${cfg.name.split(' ').slice(1).join(' ')}</div>`;
    tile.addEventListener('click', e => { e.preventDefault(); switchGame(key); });
    grid.appendChild(tile);
  });

  // Init each game area with controls
  Object.entries(GAME_CONFIGS).forEach(([key, cfg]) => {
    const area = document.getElementById('area-' + key);
    if (!area) return;
    area.innerHTML = `
      <div class="game-board"><div class="board-main" style="display:flex;align-items:center;justify-content:center;font-size:48px;flex-direction:column;gap:8px">
        <div>${cfg.name.split(' ')[0]}</div>
        <div style="font-size:14px;color:var(--text-dim)">${cfg.name}</div>
      </div></div>
      <div class="game-controls">
        <div class="bet-controls">
          <button class="bet-btn" data-minus="${key}">−</button>
          <input type="number" class="bet-input" id="bet${key.charAt(0).toUpperCase()+key.slice(1)}" value="100" inputmode="numeric">
          <button class="bet-btn" data-plus="${key}">+</button>
        </div>
        <div class="quick-bets">
          <button class="quick-bet" data-qb="${key}" data-val="50">50</button><button class="quick-bet" data-qb="${key}" data-val="100">100</button><button class="quick-bet" data-qb="${key}" data-val="500">500</button><button class="quick-bet" data-qb="${key}" data-val="1000">1K</button>
        </div>
        <button class="game-action-btn" id="btn${key.charAt(0).toUpperCase()+key.slice(1)}">🎮 Играть</button>
        <div class="mini-stats">Ставка: <b>100 ⭐</b></div>
      </div>`;
  });

  // Bet controls
  document.querySelectorAll('.bet-btn[data-minus]').forEach(b => {
    b.addEventListener('click', e => {
      e.preventDefault();
      const gk = b.dataset.minus;
      const inp = document.getElementById('bet' + gk.charAt(0).toUpperCase()+gk.slice(1));
      if (inp) inp.value = Math.max(10, (parseInt(inp.value)||0) - 10);
    });
  });
  document.querySelectorAll('.bet-btn[data-plus]').forEach(b => {
    b.addEventListener('click', e => {
      e.preventDefault();
      const gk = b.dataset.plus;
      const inp = document.getElementById('bet' + gk.charAt(0).toUpperCase()+gk.slice(1));
      if (inp) inp.value = (parseInt(inp.value)||0) + 10;
    });
  });
  document.querySelectorAll('.quick-bet').forEach(b => {
    b.addEventListener('click', e => {
      e.preventDefault();
      const gk = b.dataset.qb;
      const inp = document.getElementById('bet' + gk.charAt(0).toUpperCase()+gk.slice(1));
      if (inp) inp.value = b.dataset.val;
    });
  });
}

// ============ PROFILE ============
function renderProfile() {
  renderGameSettingsPanel();
  renderErrorPanel();
  renderSettingsPanel();
}

// ============ GAME SETTINGS PANEL ============
function renderGameSettingsPanel() {
  const panel = $('panelGameSettings'); if (!panel) return;
  
  let html = '<div class="card"><div class="card-title">🎮 Управление играми</div>';
  html += '<p style="font-size:10px;color:var(--text-dim);margin-bottom:12px;">Настройка параметров игр. Изменение одного ползунка влияет на остальные. Комиссия сайта = 1% (вероятность проигрыша).</p>';
  
  Object.entries(GAME_CONFIGS).forEach(([gk, cfg]) => {
    const settings = gameSettings[gk] || {};
    html += `<div class="slider-group"><div class="slider-group-title">${cfg.name}</div>`;
    
    Object.entries(cfg.params).forEach(([pk, param]) => {
      const val = settings[pk] !== undefined ? settings[pk] : param.value;
      html += `<div class="slider-row">
        <span class="slider-label">${param.label}</span>
        <input type="range" class="slider-input" 
          data-game="${gk}" data-param="${pk}"
          min="${param.min}" max="${param.max}" step="${param.step}" value="${val}">
        <span class="slider-value" id="sv_${gk}_${pk}">${val}${param.unit}</span>
      </div>`;
    });
    
    html += `<div class="slider-info"><b>Формула:</b> ${cfg.getFormula(settings)}</div>`;
    html += '</div>';
  });
  
  html += '<button class="btn-primary" id="resetGameSettings">🔄 Сбросить настройки игр</button>';
  html += '</div>';
  
  panel.innerHTML = html;
  
  // Attach slider listeners
  panel.querySelectorAll('.slider-input').forEach(slider => {
    slider.addEventListener('input', function() {
      const gk = this.dataset.game;
      const pk = this.dataset.param;
      const val = parseFloat(this.value);
      
      // Update this game's settings with interdependent computation
      const cfg = GAME_CONFIGS[gk];
      if (!cfg) return;
      
      const currentSettings = { ...(gameSettings[gk] || {}) };
      Object.keys(cfg.params).forEach(k => {
        if (currentSettings[k] === undefined) currentSettings[k] = cfg.params[k].value;
      });
      
      const newSettings = cfg.compute(pk, val, currentSettings);
      gameSettings[gk] = newSettings;
      saveGameSettings();
      
      // Update all sliders and values for this game
      Object.entries(newSettings).forEach(([k, v]) => {
        const slider = panel.querySelector(`.slider-input[data-game="${gk}"][data-param="${k}"]`);
        if (slider && document.activeElement !== slider) {
          slider.value = v;
        }
        const valEl = document.getElementById(`sv_${gk}_${k}`);
        if (valEl) {
          const param = cfg.params[k];
          valEl.textContent = (typeof v === 'number' ? v.toFixed(param.step < 1 ? 1 : 0) : v) + (param?.unit || '');
        }
      });
      
      // Update formula display
      const infoEl = panel.querySelector(`.slider-group:nth-child(${Object.keys(GAME_CONFIGS).indexOf(gk)+2}) .slider-info`);
      if (infoEl) {
        infoEl.innerHTML = `<b>Формула:</b> ${cfg.getFormula(newSettings)}`;
      }
    });
  });
  
  // Reset button
  const resetBtn = $('resetGameSettings');
  if (resetBtn) {
    resetBtn.addEventListener('click', e => {
      e.preventDefault();
      Object.keys(GAME_CONFIGS).forEach(gk => {
        gameSettings[gk] = {};
        Object.entries(GAME_CONFIGS[gk].params).forEach(([pk, p]) => {
          gameSettings[gk][pk] = p.value;
        });
      });
      saveGameSettings();
      renderGameSettingsPanel();
      toast('🔄 Настройки игр сброшены', 'success');
    });
  }
}

// ============ ERROR PANEL ============
function renderErrorPanel() {
  const panel = $('panelErrors'); if (!panel) return;
  
  const errors = ErrorLogger.getAll();
  let html = '<div class="card"><div class="card-title">🐛 Журнал ошибок</div>';
  
  if (errors.length === 0) {
    html += '<div class="error-log-empty">✅ Ошибок не обнаружено</div>';
  } else {
    html += `<div style="display:flex;gap:6px;margin-bottom:10px;">
      <button class="btn-primary" id="copyErrorsBtn" style="flex:1;font-size:11px;padding:8px;">📋 Копировать все</button>
      <button class="btn-primary danger" id="clearErrorsBtn" style="flex:1;font-size:11px;padding:8px;">🗑 Очистить</button>
    </div>`;
    
    errors.slice(0, 50).forEach((e, i) => {
      const d = new Date(e.time);
      const timeStr = d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU');
      html += `<div class="error-log-item">
        <div class="error-log-time">${timeStr} · ${e.type || 'unknown'}</div>
        <div class="error-log-msg">${escapeHtml(e.message || 'Неизвестная ошибка')}</div>
        ${e.stack ? `<div class="error-log-stack">${escapeHtml(e.stack.substring(0, 200))}</div>` : ''}
      </div>`;
    });
    
    if (errors.length > 50) {
      html += `<div style="text-align:center;padding:10px;color:var(--text-dim);font-size:11px;">Показано 50 из ${errors.length} ошибок</div>`;
    }
  }
  
  html += '</div>';
  panel.innerHTML = html;
  
  // Copy errors
  const copyBtn = document.getElementById('copyErrorsBtn');
  if (copyBtn) {
    copyBtn.addEventListener('click', e => {
      e.preventDefault();
      const text = ErrorLogger.getText();
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(text).then(() => toast('📋 Ошибки скопированы', 'success'));
      } else {
        toast('Не удалось скопировать', 'error');
      }
    });
  }
  
  // Clear errors
  const clearBtn = document.getElementById('clearErrorsBtn');
  if (clearBtn) {
    clearBtn.addEventListener('click', e => {
      e.preventDefault();
      ErrorLogger.clear();
      toast('🗑 Журнал ошибок очищен', 'success');
    });
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============ SETTINGS PANEL ============
function renderSettingsPanel() {
  const panel = $('panelSettings'); if (!panel) return;
  
  panel.innerHTML = `
    <div class="card"><div class="card-title">⚙️ Настройки</div>
      <div class="menu-list">
        <div class="menu-item" id="menuSound">
          <div class="menu-ico">🔊</div><div class="menu-label">Звуки в играх</div>
          <div class="toggle ${soundEnabled?'on':''}" id="soundToggle"></div>
        </div>
        <div class="menu-item" id="menuNotif">
          <div class="menu-ico">🔔</div><div class="menu-label">Уведомления</div>
          <div class="toggle ${state.notif?'on':''}" id="notifToggle"></div>
        </div>
        <div class="menu-item danger" id="menuResetAll">
          <div class="menu-ico">🔄</div><div class="menu-label">Сбросить ВСЕ данные</div>
          <div class="menu-arrow">›</div>
        </div>
      </div>
    </div>`;
  
  // Sound toggle
  const soundToggle = document.getElementById('soundToggle');
  if (soundToggle) {
    soundToggle.addEventListener('click', e => {
      e.preventDefault();
      soundEnabled = !soundEnabled;
      safeSetItem('sb_sound', soundEnabled ? '1' : '0');
      soundToggle.classList.toggle('on', soundEnabled);
      toast(soundEnabled ? '🔊 Звуки включены' : '🔇 Звуки выключены', soundEnabled ? 'success' : '');
    });
  }
  
  // Notif toggle
  const notifToggle = document.getElementById('notifToggle');
  if (notifToggle) {
    notifToggle.addEventListener('click', async e => {
      e.preventDefault();
      if (!state.notif) {
        if ('Notification' in window && Notification.permission === 'default') {
          const result = await Notification.requestPermission();
          state.notif = result === 'granted';
        } else {
          state.notif = true;
        }
      } else {
        state.notif = false;
      }
      saveState();
      notifToggle.classList.toggle('on', state.notif);
      toast(state.notif ? '🔔 Уведомления включены' : '🔕 Уведомления выключены', state.notif ? 'success' : '');
    });
  }
  
  // Reset all
  const resetBtn = document.getElementById('menuResetAll');
  if (resetBtn) {
    resetBtn.addEventListener('click', e => {
      e.preventDefault();
      if (!confirm('⚠️ Сбросить ВСЕ данные?\n\nБаланс, статистика, история и настройки будут удалены безвозвратно.')) return;
      try {
        safeRemoveItem('sb_state_v9');
        safeRemoveItem('sb_history_v9');
        safeRemoveItem('sb_ticker');
        safeRemoveItem('sb_game_settings');
        safeRemoveItem('sb_errors_v1');
        safeRemoveItem('sb_sound');
        Object.assign(state, JSON.parse(JSON.stringify(DEFAULT_STATE)));
        state.cycleEnd = Date.now() + 6*3600*1000;
        saveState();
        ErrorLogger.clear();
        updateUI();
        renderHistory();
        initTicker();
        toast('🔄 Все данные сброшены', 'success');
      } catch(ex) {
        ErrorLogger.log('Reset failed: ' + ex.message);
        toast('❌ Ошибка сброса', 'error');
      }
    });
  }
}

// Profile tabs
document.getElementById('profileTabsNav')?.addEventListener('click', e => {
  const btn = e.target.closest('.profile-tab-btn');
  if (!btn) return;
  e.preventDefault();
  document.querySelectorAll('.profile-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const tab = btn.dataset.ptab;
  const panel = document.querySelector(`.profile-panel[data-panel="${tab}"]`);
  if (panel) panel.scrollIntoView({behavior:'smooth', block:'nearest', inline:'start'});
  SFX.click();
});

// ============ BANK LOGIC ============
let selectedFreezeAmt = 100;
document.getElementById('freezeAmounts')?.addEventListener('click', e => {
  const btn = e.target.closest('.freeze-amt');
  if (!btn) return;
  e.preventDefault();
  document.querySelectorAll('#freezeAmounts .freeze-amt').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  selectedFreezeAmt = parseInt(btn.dataset.amt);
  SFX.click();
});

$('freezeBtn')?.addEventListener('click', e => {
  e.preventDefault();
  if (state.balance < selectedFreezeAmt) { toast('Недостаточно Stars', 'error'); return; }
  state.balance -= selectedFreezeAmt;
  state.frozen += selectedFreezeAmt;
  state.totalBank += selectedFreezeAmt;
  if (Date.now() >= state.cycleEnd && !state.pendingProfit) state.cycleEnd = Date.now() + 6*3600*1000;
  saveState(); updateUI();
  addHistory('freeze', 'Заморозка Stars', -selectedFreezeAmt);
  toast('❄️ Заморожено ' + fmt(selectedFreezeAmt) + ' ⭐', 'success');
  SFX.win();
});

$('unfreezeBtn')?.addEventListener('click', e => {
  e.preventDefault();
  if (state.frozen <= 0 || Date.now() < state.cycleEnd) { toast('Забрать можно после круга', 'error'); return; }
  const total = state.frozen + state.pendingProfit;
  state.balance += total;
  state.totalBank = Math.max(0, state.totalBank - state.frozen);
  state.frozen = 0; state.pendingProfit = 0;
  state.cycleEnd = Date.now() + 6*3600*1000;
  saveState(); updateUI();
  addHistory('unfreeze', 'Разморозка + прибыль', total);
  toast('💰 +' + fmt(total) + ' ⭐', 'gold');
  SFX.bigwin();
});

// ============ BALANCE ============
$('depBtn')?.addEventListener('click', e => { e.preventDefault(); openModal('deposit'); });
$('wdBtn')?.addEventListener('click', e => { e.preventDefault(); openModal('withdraw'); });

// ============ MODALS ============
function openModal(type) {
  const content = $('modalContent'); if (!content) return;
  let html = '<div class="modal-handle"></div><button class="modal-close" id="modalClose">✕</button>';
  if (type === 'deposit') {
    html += `<div class="modal-title">⭐ Пополнение</div><div class="quick-amts">${['50','100','500','1000','5000'].map((v,i) => `<button class="quick-amt${i===1?' active':''}" data-amt="${v}">${v==='1000'?'1K':v==='5000'?'5K':v}</button>`).join('')}</div>
      <div class="input-group"><label class="input-label">Сумма</label><input type="number" class="input-field" id="depAmount" value="100" inputmode="numeric"></div>
      <button class="btn-primary" id="doDeposit">⭐ Пополнить</button>`;
  } else if (type === 'withdraw') {
    html += `<div class="modal-title">💸 Вывод</div><div class="quick-amts">${['50','100','500','1000','5000'].map((v,i) => `<button class="quick-amt${i===1?' active':''}" data-amt="${v}">${v==='1000'?'1K':v==='5000'?'5K':v}</button>`).join('')}</div>
      <div class="input-group"><label class="input-label">Сумма</label><input type="number" class="input-field" id="wdAmount" value="100" inputmode="numeric"></div>
      <button class="btn-primary gold" id="doWithdraw">💸 Вывести</button>`;
  }
  content.innerHTML = html;
  $('modalOverlay').classList.add('show');
  
  $('modalClose')?.addEventListener('click', e => { e.preventDefault(); closeModal(); });
  
  if (type === 'deposit') {
    content.querySelectorAll('.quick-amt').forEach(b => b.addEventListener('click', e => {
      e.preventDefault();
      content.querySelectorAll('.quick-amt').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      const inp = document.getElementById('depAmount'); if (inp) inp.value = b.dataset.amt;
    }));
    document.getElementById('doDeposit')?.addEventListener('click', e => {
      e.preventDefault();
      const amt = parseInt(document.getElementById('depAmount')?.value) || 0;
      if (amt < 10) { toast('Минимум 10 ⭐', 'error'); return; }
      state.balance += amt; saveState(); updateUI(); closeModal();
      addHistory('deposit', 'Пополнение', amt);
      toast('✅ +' + fmt(amt) + ' ⭐', 'success');
      SFX.win();
    });
  }
  if (type === 'withdraw') {
    content.querySelectorAll('.quick-amt').forEach(b => b.addEventListener('click', e => {
      e.preventDefault();
      content.querySelectorAll('.quick-amt').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      const inp = document.getElementById('wdAmount'); if (inp) inp.value = b.dataset.amt;
    }));
    document.getElementById('doWithdraw')?.addEventListener('click', e => {
      e.preventDefault();
      const amt = parseInt(document.getElementById('wdAmount')?.value) || 0;
      if (amt < 100) { toast('Минимум 100 ⭐', 'error'); return; }
      if (state.balance < amt) { toast('Недостаточно', 'error'); return; }
      state.balance -= amt; saveState(); updateUI(); closeModal();
      addHistory('withdraw', 'Вывод средств', -amt);
      toast('📨 Заявка на ' + fmt(amt) + ' ⭐', 'gold');
    });
  }
}

function closeModal() { $('modalOverlay')?.classList.remove('show'); }
$('modalOverlay')?.addEventListener('click', e => { if (e.target === $('modalOverlay')) closeModal(); });

// ============ TIMER ============
function updateTimer() {
  const diff = state.cycleEnd - Date.now();
  const tv = $('timerValue'); if (!tv) return;
  if (diff < 0) {
    if (state.frozen > 0 && !state.pendingProfit) {
      state.pendingProfit = Math.floor(state.frozen * 0.05);
      saveState(); updateUI();
      toast('🎉 Круг завершён! +' + fmt(state.pendingProfit) + ' ⭐', 'gold');
      SFX.bigwin();
    }
    tv.textContent = '00:00:00';
    return;
  }
  tv.textContent = [Math.floor(diff/3600000), Math.floor((diff%3600000)/60000), Math.floor((diff%60000)/1000)]
    .map(v => String(v).padStart(2,'0')).join(':');
}

// ============ INIT ============
function init() {
  ErrorLogger.init();
  initTicker();
  updateUI();
  renderHistory();
  initGames();
  
  // Timer
  updateTimer();
  setInterval(updateTimer, 1000);
  
  // Bank growth
  setInterval(() => { state.totalBank += Math.floor(Math.random()*500+100); saveState(); updateUI(); }, 30000);
  
  // Ticker refresh
  setInterval(() => {
    const items = safeGetItem('sb_ticker', []);
    items.unshift({ name: rndName(), mult: 25+Math.random()*200, icon: '🚀' });
    if (items.length > 30) items.splice(30);
    safeSetItem('sb_ticker', items);
    renderTicker();
  }, 15000);
  
  console.log('✅ Stars Bank initialized successfully');
  ErrorLogger.log('App initialized', '');
}

window.addEventListener('load', init);
window.addEventListener('error', () => {}); // Уже обрабатывается в ErrorLogger

})();
</script>
